<style>
    .stats-row {
        display: grid;
        gap: 15px;
        width: 100%;
        padding: 10px;
        box-sizing: border-box;
    }

    /* Mobile: 2 per row */
    @media (max-width: 767px) {
        .stats-row {
            grid-template-columns: repeat(2, 1fr);
        }
    }

    /* Desktop: 3 per row */
    @media (min-width: 768px) {
        .stats-row {
            grid-template-columns: repeat(3, 1fr);
        }
    }

    .stat-card {
        background: #ffffff;
        padding: 18px;
        border-radius: 12px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        border: 1px solid #eee;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        min-height: 110px;
        transition: transform 0.2s ease;
    }

    .stat-card:hover {
        transform: translateY(-2px);
    }

    .stat-card.highlight {
        background-color: #eef6ff;
        border-color: #4a90e2;
    }

    .lab-time {
        font-size: 11px;
        color: #4a90e2;
        font-weight: 700;
        letter-spacing: 0.5px;
        text-transform: uppercase;
        display: block;
    }

    .lab-name {
        font-size: 16px;
        font-weight: 600;
        color: #333;
        margin-top: 6px;
    }

    .download-container {
        margin-top: 12px;
        text-align: right;
    }

    .download-link {
        text-decoration: none;
        color: #888;
        font-size: 16px;
        transition: color 0.2s;
    }
    
    .download-link:hover {
        color: #4a90e2;
    }
</style>

<div class="stats-row">
    
    <div class="stat-card highlight">
        <div class="stat-text">
            <span class="lab-time">09:00 AM</span>
            <div class="lab-name">OOAD</div>
        </div>
        <div class="download-container">
            <a href="https://drive.google.com/file/d/1_CdPs-fS3O8Eicvtl9486sGlsULZCNmQ/view?usp=drive_link" target="_blank" class="download-link"><i class="fas fa-download"></i></a>
        </div>
    </div>
    <div class="stat-card">
        <div class="stat-text">
            <span class="lab-time">04:00 PM</span>
            <div class="lab-name">CC</div>
        </div>
        <div class="download-container">
            <a href="#" class="download-link"><i class="fas fa-download"></i></a>
        </div>
    </div>
</div>
</div>


<script>
    document.querySelectorAll('.download-link').forEach(btn => {
        btn.addEventListener('click', function(e) {
            // Your download logic here
            const className = this.closest('.stat-card').querySelector('.lab-name').innerText;
            console.log("Downloading for: " + className);
        });
    });
</script>
